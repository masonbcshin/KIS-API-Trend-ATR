name: Auto Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ${{ secrets.PROJECT_PATH }}

            echo ">>> Git pull"
            git pull

            echo ">>> Migrate BUY entry quality env"
            bash tools/migrate_entry_buy_quality_env.sh

            echo ">>> Migrate market regime env"
            bash tools/migrate_market_regime_env.sh

            echo ">>> Activate venv"
            if [ -d "venv" ]; then
              source venv/bin/activate
            fi

            

            echo ">>> Restart service"
            sudo systemctl restart auto-trade

            echo ">>> Check status"
            sudo systemctl is-active --quiet auto-trade
            sudo systemctl --no-pager --full status auto-trade || true
