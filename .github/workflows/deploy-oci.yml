name: Auto Deploy to OCI

on:
  # OCI auto-deploy on push stays disabled to avoid duplicate production rollout.
  # push:
  #   branches:
  #     - main
  # Manual dispatch is kept for explicit OCI deployments only.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd ${{ secrets.OCI_PROJECT_PATH }}

            echo ">>> Git pull"
            git pull

            echo ">>> Migrate BUY entry quality env"
            bash tools/migrate_entry_buy_quality_env.sh

            echo ">>> Migrate market regime env"
            bash tools/migrate_market_regime_env.sh

            echo ">>> Restart service"
            sudo systemctl restart auto-trade

            echo ">>> Check status"
            sudo systemctl is-active --quiet auto-trade
            sudo systemctl --no-pager --full status auto-trade || true
